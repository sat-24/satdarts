<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sat Darts</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }

body {
  background: #fff7c7;
  font-family: 'Nunito', Helvetica, sans-serif;
  width:100vw; height:100vh;
  overflow:hidden;
  display:flex; flex-direction:column;
  align-items:center;
}

/* ── SCORES ── */
#scores {
  width:100%; display:flex;
  background:rgba(0,0,0,0.06);
  border-bottom:2px solid rgba(0,0,0,0.08);
  flex-shrink:0;
}
.score-block {
  flex:1; text-align:center;
  padding:10px 8px 8px;
  transition:background 0.25s;
}
.score-block:first-child { border-right:1px solid rgba(0,0,0,0.08); }
.score-block.active { background:rgba(0,0,0,0.1); }
.p-name { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(0,0,0,0.4); }
.score-block:nth-child(1) .p-name { color:#1a7abf; }
.score-block:nth-child(2) .p-name { color:#bf2222; }
.p-score { font-size:44px; font-weight:900; color:#111; line-height:1.1; }
.score-block.active .p-score { color:#111; }
.p-darts { display:flex; gap:5px; justify-content:center; margin-top:3px; min-height:9px; }
.pip { width:9px; height:9px; border-radius:50%; background:rgba(0,0,0,0.15); }
.pip.on  { background:#333; }
.pip.off { background:rgba(0,0,0,0.07); transform:scale(0.8); }


/* ── GAME AREA: vertical meter + board ── */
#game-area {
  flex:1; display:flex;
  justify-content:center; align-items:center;
  gap:14px;
  padding:10px 14px 0;
  min-height:0;
  width:100%;
}

/* vertical meter */
.vertical-meter {
  width:22px;
  height:100%;
  background:#222;
  border:2px solid #555;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  touch-action:none;
}
.v-target {
  position:absolute;
  height:3px; width:100%;
  background:white; opacity:0.5;
  top:50%; transform:translateY(-50%);
}
#v-bar {
  position:absolute;
  height:5px; width:100%;
  background:red;
  top:0;
}

/* board */
#board {
  position:relative;
  /* square, fit available space */
  height:100%;
  aspect-ratio:1;
  min-width:0; min-height:0;
  flex-shrink:1;
}
#dartboard {
  width:100%; height:100%;
  display:block;
}
#dartboard text {
  font-family: Helvetica, sans-serif;
  font-weight:bolder;
  pointer-events:none;
}
/* dart SVG overlay */
#dart {
  position:absolute;
  width:min(90px, 18vw);
  transform:translate(-50%,-50%) rotate(15deg);
  pointer-events:none;
  display:none;
  z-index:10;
  filter:drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
}
#dart svg { width:100%; display:block; }

/* opponent turn overlay */
#board-block {
  position:absolute; inset:0;
  z-index:20; display:none;
  cursor:not-allowed;
}
#turn-label {
  position:absolute;
  top:-28px; left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  background:rgba(0,0,0,0.55);
  color:rgba(255,255,255,0.85);
  font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  padding:5px 14px; border-radius:20px;
  display:none; z-index:5;
}

/* ── HORIZONTAL METER ── */
#h-meter-wrap {
  width:100%; padding:0 14px;
  flex-shrink:0;
}
.horizontal-meter {
  width:100%;
  height:22px;
  background:#222;
  border:2px solid #555;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  margin:10px 0 6px;
  touch-action:none;
}
.h-target {
  position:absolute;
  width:3px; height:100%;
  background:white; opacity:0.5;
  left:50%; transform:translateX(-50%);
}
#h-bar {
  position:absolute;
  width:5px; height:100%;
  background:red;
  left:0;
}

/* ── THROW INSTRUCTION ── */
#tap-hint {
  font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:rgba(0,0,0,0.35);
  text-align:center; padding:2px 0 8px;
}

/* ── SCORE POPUP ── */
#score-pop {
  position:fixed; top:46%; left:50%;
  transform:translate(-50%,-50%) scale(0.3);
  font-size:96px; font-weight:900; color:#fff;
  -webkit-text-stroke:5px #111;
  text-shadow:4px 4px 0 rgba(0,0,0,0.4);
  pointer-events:none; z-index:300; opacity:0; transition:none;
}
#score-pop.show {
  opacity:1; transform:translate(-50%,-50%) scale(1);
  transition:transform 0.2s cubic-bezier(.12,.8,.35,1.4), opacity 0.18s;
}
#score-pop.hide {
  opacity:0; transform:translate(-50%,-58%) scale(0.8);
  transition:all 0.28s ease-in;
}
#bust-pop {
  position:fixed; top:46%; left:50%;
  transform:translate(-50%,-50%) rotate(-9deg) scale(0.4);
  font-size:76px; font-weight:900; color:#ff2222;
  -webkit-text-stroke:4px #111;
  text-shadow:4px 4px 0 rgba(0,0,0,0.4);
  pointer-events:none; z-index:300; opacity:0; transition:none;
}
#bust-pop.show {
  opacity:1; transform:translate(-50%,-50%) rotate(-9deg) scale(1);
  transition:transform 0.2s cubic-bezier(.12,.8,.35,1.4), opacity 0.18s;
}

/* ── LOBBY ── */
#lobby {
  position:fixed; inset:0; z-index:400;
  background:#fff7c7;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; padding:32px 28px;
}
.lob-title { font-size:82px; font-weight:900; color:#111; line-height:1; letter-spacing:-3px; }
.lob-sub { font-size:11px; font-weight:700; color:rgba(0,0,0,0.35); letter-spacing:5px; text-transform:uppercase; margin-top:-14px; }
.lob-field { display:flex; flex-direction:column; gap:6px; width:100%; max-width:290px; }
.lob-field label { font-size:9px; font-weight:700; color:rgba(0,0,0,0.45); letter-spacing:3px; text-transform:uppercase; }
.lob-field input {
  background:rgba(0,0,0,0.06); border:2px solid rgba(0,0,0,0.15);
  border-radius:12px; padding:13px 15px;
  font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; color:#111;
  outline:none; width:100%; touch-action:auto; user-select:auto;
  transition:border-color 0.2s;
}
.lob-field input:focus { border-color:rgba(0,0,0,0.4); }
.lob-field input::placeholder { color:rgba(0,0,0,0.22); }
#fi-room { text-transform:uppercase; letter-spacing:5px; font-size:17px; }
.lob-btn {
  width:100%; max-width:290px; background:#111; color:#fff;
  border:none; border-radius:13px; padding:15px;
  font-family:'Nunito',sans-serif; font-size:20px; font-weight:900;
  cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.3);
  transition:transform 0.1s, box-shadow 0.1s;
}
.lob-btn:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,0.3); }
.lob-hint { font-size:11px; font-weight:700; color:rgba(0,0,0,0.3); text-align:center; max-width:260px; line-height:1.8; }

/* ── WAITING ── */
#waiting {
  position:fixed; inset:0; z-index:400; background:#fff7c7;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:22px;
}
.wt-title { font-size:24px; font-weight:900; color:#111; }
.wt-box { background:rgba(0,0,0,0.07); border-radius:16px; padding:16px 32px; text-align:center; }
.wt-lbl { font-size:9px; font-weight:700; color:rgba(0,0,0,0.4); letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.wt-code { font-size:52px; font-weight:900; color:#c80; letter-spacing:10px; }
.spinner { width:34px; height:34px; border:3px solid rgba(0,0,0,0.1); border-top-color:#333; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── GAME OVER ── */
#gameover {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.8);
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
}
.go-trophy { font-size:66px; animation:bob 0.55s ease-in-out infinite alternate; }
@keyframes bob { to{transform:translateY(-10px)} }
.go-head { font-size:54px; font-weight:900; color:#ffd700; }
.go-name { font-size:26px; font-weight:900; color:#fff; }
.go-row { display:flex; gap:20px; }
.go-card { background:rgba(255,255,255,0.1); border-radius:14px; padding:14px 26px; text-align:center; }
.go-pn { font-size:9px; font-weight:700; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; }
.go-pv { font-size:38px; font-weight:900; color:#fff; }
.go-btn { background:#fff7c7; color:#111; border:none; border-radius:13px; padding:13px 36px; font-family:'Nunito',sans-serif; font-size:19px; font-weight:900; cursor:pointer; }

#exit-btn {
  position:fixed; top:10px; right:10px; z-index:50; display:none;
  background:#111; color:#fff; border:none; border-radius:22px;
  padding:7px 16px; font-family:'Nunito',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- SCORES -->
<div id="scores">
  <div class="score-block" id="sb0">
    <div class="p-name" id="pn0">Player 1</div>
    <div class="p-score" id="ps0">301</div>
    <div class="p-darts" id="pd0">
      <div class="pip" id="pip0-0"></div>
      <div class="pip" id="pip0-1"></div>
      <div class="pip" id="pip0-2"></div>
    </div>
  </div>
  <div class="score-block" id="sb1">
    <div class="p-name" id="pn1">Player 2</div>
    <div class="p-score" id="ps1">301</div>
    <div class="p-darts" id="pd1">
      <div class="pip" id="pip1-0"></div>
      <div class="pip" id="pip1-1"></div>
      <div class="pip" id="pip1-2"></div>
    </div>
  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">

  <!-- vertical meter -->
  <div class="vertical-meter" id="v-meter">
    <div class="v-target"></div>
    <div id="v-bar"></div>
  </div>

  <!-- board -->
  <div id="board">
    <div id="turn-label"></div>
    <svg id="dartboard" viewBox="0 0 500 500"></svg>
    <div id="dart">
      <svg viewBox="0 0 220 40">
        <polygon points="0,20 20,15 20,25" fill="#cfcfcf"/>
        <rect x="20" y="15" width="80" height="10" rx="3" fill="#c0c0c0"/>
        <rect x="30" y="15" width="3" height="10" fill="#888"/>
        <rect x="40" y="15" width="3" height="10" fill="#888"/>
        <rect x="50" y="15" width="3" height="10" fill="#888"/>
        <rect x="60" y="15" width="3" height="10" fill="#888"/>
        <rect x="70" y="15" width="3" height="10" fill="#888"/>
        <rect x="100" y="17" width="30" height="6" fill="#444"/>
        <polygon points="130,20 180,5 180,35" fill="#e33"/>
        <polygon points="130,20 180,5 150,20" fill="#ff6666"/>
        <polygon points="130,20 180,35 150,20" fill="#aa0000"/>
      </svg>
    </div>
    <div id="board-block"></div>
  </div>

</div>

<!-- HORIZONTAL METER -->
<div id="h-meter-wrap">
  <div class="horizontal-meter" id="h-meter">
    <div class="h-target"></div>
    <div id="h-bar"></div>
  </div>
  <div id="tap-hint">TAP TO LOCK HORIZONTAL</div>
</div>

<div id="score-pop"></div>
<div id="bust-pop">BUST!</div>
<button id="exit-btn" onclick="location.reload()">EXIT</button>

<!-- LOBBY -->
<div id="lobby">
  <div class="lob-title">301</div>
  <div class="lob-sub">Multiplayer Darts</div>
  <div class="lob-field">
    <label>Your Name</label>
    <input id="fi-name" placeholder="Enter name" maxlength="12">
  </div>
  <div class="lob-field">
    <label>Room Code</label>
    <input id="fi-room" placeholder="E.G. BULLS" maxlength="8">
  </div>
  <button class="lob-btn" id="join-btn">JOIN ROOM</button>
  <div class="lob-hint">Both players enter the same code to connect.</div>
</div>

<!-- WAITING -->
<div id="waiting">
  <div class="wt-title">Waiting for opponent…</div>
  <div class="wt-box">
    <div class="wt-lbl">Room Code</div>
    <div class="wt-code" id="wt-code">----</div>
  </div>
  <div class="spinner"></div>
  <div class="lob-hint">Share this code with your opponent</div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-trophy">🏆</div>
  <div class="go-head">WINNER!</div>
  <div class="go-name" id="go-name"></div>
  <div class="go-row">
    <div class="go-card"><div class="go-pn" id="go-n0">P1</div><div class="go-pv" id="go-v0">0</div></div>
    <div class="go-card"><div class="go-pn" id="go-n1">P2</div><div class="go-pv" id="go-v1">301</div></div>
  </div>
  <button class="go-btn" onclick="location.reload()">Play Again</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ════════════════════════════════════════════
//  DRAW DARTBOARD (sat's original logic)
// ════════════════════════════════════════════
const svg = document.getElementById("dartboard")
const NS  = "http://www.w3.org/2000/svg"
const bx=250, by=250

const rings = {
  innerSingle:100, tripleInner:100, tripleOuter:120,
  outerSingle:190, doubleInner:190, doubleOuter:210
}
const SEGS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5]

// outer black disc
let nr=document.createElementNS(NS,"circle")
nr.setAttribute("cx",250); nr.setAttribute("cy",250)
nr.setAttribute("r",250); nr.setAttribute("fill","black")
svg.appendChild(nr)

function createSlice(innerR,outerR,startAngle,endAngle,color){
  let path=document.createElementNS(NS,"path")
  let x1=bx+innerR*Math.cos(startAngle), y1=by+innerR*Math.sin(startAngle)
  let x2=bx+outerR*Math.cos(startAngle), y2=by+outerR*Math.sin(startAngle)
  let x3=bx+outerR*Math.cos(endAngle),   y3=by+outerR*Math.sin(endAngle)
  let x4=bx+innerR*Math.cos(endAngle),   y4=by+innerR*Math.sin(endAngle)
  let d=`M ${x1} ${y1} L ${x2} ${y2} A ${outerR} ${outerR} 0 0 1 ${x3} ${y3} L ${x4} ${y4} A ${innerR} ${innerR} 0 0 0 ${x1} ${y1} Z`
  path.setAttribute("d",d); path.setAttribute("fill",color)
  svg.appendChild(path)
}

for(let i=0;i<20;i++){
  let start=(i*18-9)*Math.PI/180
  let end  =((i+1)*18-9)*Math.PI/180
  let sliceColor=i%2==0?"#f0e6d6":"#000"
  let ringColor =i%2==0?"green":"red"
  createSlice(35,  rings.innerSingle,start,end,sliceColor)
  createSlice(rings.tripleInner,rings.tripleOuter,start,end,ringColor)
  createSlice(rings.tripleOuter,rings.outerSingle,start,end,sliceColor)
  createSlice(rings.doubleInner,rings.doubleOuter,start,end,ringColor)
}

function svgCircle(r,color){
  let c=document.createElementNS(NS,"circle")
  c.setAttribute("cx",250); c.setAttribute("cy",250)
  c.setAttribute("r",r); c.setAttribute("fill",color)
  svg.appendChild(c)
}
svgCircle(35,"#000")
svgCircle(30,"#f0e6d6")
svgCircle(15,"red")

const numberRadius=230
for(let i=0;i<20;i++){
  let angle=i*18*Math.PI/180
  let x=bx+numberRadius*Math.sin(angle)
  let y=by-numberRadius*Math.cos(angle)
  let t=document.createElementNS(NS,"text")
  t.setAttribute("x",x); t.setAttribute("y",y)
  t.setAttribute("fill","white"); t.setAttribute("font-size","22")
  t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","middle")
  t.textContent=SEGS[i]; svg.appendChild(t)
}

// ════════════════════════════════════════════
//  METERS — sat's original bouncing bar logic
// ════════════════════════════════════════════
let hPos=0, hDir=1, hLocked=false
let vPos=0, vDir=1, vLocked=false

const hBar  = document.getElementById("h-bar")
const vBar  = document.getElementById("v-bar")
const hint  = document.getElementById("tap-hint")

let hInterval=null, vInterval=null

function startHorizontal(){
  hLocked=false; vLocked=false
  hPos=0; hDir=1; vPos=0; vDir=1
  hBar.style.left='0%'
  vBar.style.top='0%'
  hint.textContent='TAP TO LOCK HORIZONTAL'
  if(hInterval) clearInterval(hInterval)
  if(vInterval) clearInterval(vInterval)
  hInterval = setInterval(()=>{
    if(hLocked) return
    hPos += hDir*2
    if(hPos>100||hPos<0) hDir*=-1
    hBar.style.left=hPos+'%'
  },20)
}

function startVertical(){
  hint.textContent='TAP TO LOCK VERTICAL & THROW'
  vInterval = setInterval(()=>{
    if(vLocked) return
    vPos += vDir*2
    if(vPos>100||vPos<0) vDir*=-1
    vBar.style.top=vPos+'%'
  },20)
}

function stopAll(){
  if(hInterval) clearInterval(hInterval)
  if(vInterval) clearInterval(vInterval)
  hint.textContent=''
}

// ════════════════════════════════════════════
//  DART PLACEMENT (sat's score logic)
// ════════════════════════════════════════════
const dartEl=document.getElementById("dart")

function placeDart(hPct, vPct){
  const board=document.getElementById("board")
  const rect=board.getBoundingClientRect()
  const x=rect.width*(hPct/100)
  const y=rect.height*(vPct/100)
  dartEl.style.left=x+'px'
  dartEl.style.top=y+'px'
  dartEl.style.display='block'
}

function calcScore(hPct, vPct){
  // convert % to board coords (500x500 viewBox)
  const boardX=(hPct/100)*500
  const boardY=(vPct/100)*500
  const dx=boardX-250, dy=boardY-250
  const distance=Math.sqrt(dx*dx+dy*dy)

  let angle=Math.atan2(dy,dx)*180/Math.PI
  angle+=90; if(angle<0) angle+=360
  const segment=Math.floor(angle/18)
  const base=SEGS[segment]

  if(distance<15)  return 50
  if(distance<30)  return 25
  if(distance<120) return base
  if(distance<140) return base*3
  if(distance<210) return base
  if(distance<230) return base*2
  return 0
}

// ════════════════════════════════════════════
//  TAP / CLICK HANDLER
// ════════════════════════════════════════════
document.addEventListener('click', handleTap)
document.addEventListener('touchend', e=>{ e.preventDefault(); handleTap(); }, {passive:false})

function handleTap(){
  if(!isMyTurn || !gameOn) return
  if(!hLocked){
    hLocked=true
    clearInterval(hInterval)
    startVertical()
  } else if(!vLocked){
    vLocked=true
    clearInterval(vInterval)
    stopAll()
    // throw!
    const jh=hPos+(Math.random()-0.5)*2
    const jv=vPos+(Math.random()-0.5)*2
    socket.emit('throw_dart',{hPct:jh, vPct:jv})
  }
}

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
let socket=null, myIndex=-1, gameOn=false, isMyTurn=false
let pNames=['Player 1','Player 2']

function applyState(gs){
  isMyTurn=(myIndex===gs.currentPlayer)&&!gs.gameOver

  document.getElementById('ps0').textContent=gs.scores[0]
  document.getElementById('ps1').textContent=gs.scores[1]
  document.getElementById('sb0').classList.toggle('active',gs.currentPlayer===0)
  document.getElementById('sb1').classList.toggle('active',gs.currentPlayer===1)

  for(let p=0;p<2;p++){
    for(let d=0;d<3;d++){
      const el=document.getElementById(`pip${p}-${d}`)
      el.className='pip'
      if(p===gs.currentPlayer){
        if(d<gs.dartsThrown)        el.classList.add('off')
        else if(d===gs.dartsThrown) el.classList.add('on')
      }
    }
  }

  const bb=document.getElementById('board-block')
  const tl=document.getElementById('turn-label')

  if(isMyTurn){
    bb.style.display='none'
    tl.style.display='none'
    // hide previous dart, start fresh
    dartEl.style.display='none'
    startHorizontal()
  } else {
    bb.style.display='block'
    tl.style.display='block'
    tl.textContent=`${pNames[gs.currentPlayer]}'s turn`
    stopAll()
    hint.textContent=''
  }
}

function showPopup(score,bust){
  if(bust){
    const el=document.getElementById('bust-pop')
    el.className=''; void el.offsetWidth; el.classList.add('show')
    setTimeout(()=>el.className='',2000)
    return
  }
  const el=document.getElementById('score-pop')
  el.textContent=score
  el.style.color=score===50?'#e8a000':score>=40?'#22aa44':'#111'
  el.className=''; void el.offsetWidth; el.classList.add('show')
  setTimeout(()=>{ el.classList.remove('show'); el.classList.add('hide') },1300)
  setTimeout(()=>el.className='',1800)
}

// ════════════════════════════════════════════
//  SOCKET
// ════════════════════════════════════════════
document.getElementById('join-btn').addEventListener('click',doJoin)
document.getElementById('fi-room').addEventListener('keydown',e=>{ if(e.key==='Enter') doJoin() })

function doJoin(){
  const name=document.getElementById('fi-name').value.trim()||'Player'
  const room=document.getElementById('fi-room').value.trim().toUpperCase()
  if(!room){ alert('Enter a room code'); return }

  socket=io()
  socket.on('connect',()=>socket.emit('join_room',{roomId:room,playerName:name}))
  socket.on('joined',({playerIndex})=>myIndex=playerIndex)
  socket.on('waiting_for_opponent',()=>{
    document.getElementById('lobby').style.display='none'
    document.getElementById('waiting').style.display='flex'
    document.getElementById('wt-code').textContent=room
  })
  socket.on('room_full',()=>{ alert('Room full! Try a different code.'); socket.disconnect(); socket=null })
  socket.on('game_start',({players,gameState:gs})=>{
    pNames=players.map(p=>p.name)
    document.getElementById('pn0').textContent=pNames[0]
    document.getElementById('pn1').textContent=pNames[1]
    document.getElementById('go-n0').textContent=pNames[0]
    document.getElementById('go-n1').textContent=pNames[1]
    document.getElementById('lobby').style.display='none'
    document.getElementById('waiting').style.display='none'
    document.getElementById('exit-btn').style.display='block'
    gameOn=true
    applyState(gs)
  })
  socket.on('dart_thrown',({dart,bust,gameState:gs})=>{
    // show dart at thrown position
    placeDart(dart.hPct, dart.vPct)
    showPopup(dart.score, bust)
    // after 1.5s clear dart and apply new state
    setTimeout(()=>applyState(gs), bust?2200:1600)
  })
  socket.on('next_turn',({gameState:gs})=>applyState(gs))
  socket.on('game_over',({winnerName,scores})=>{
    stopAll()
    document.getElementById('go-name').textContent=winnerName+' wins!'
    document.getElementById('go-v0').textContent=scores[0]
    document.getElementById('go-v1').textContent=scores[1]
    document.getElementById('gameover').style.display='flex'
  })
  socket.on('opponent_disconnected',()=>{
    stopAll()
    document.getElementById('turn-label').textContent='Opponent disconnected'
    document.getElementById('turn-label').style.display='block'
    document.getElementById('board-block').style.display='block'
  })
}
</script>
</body>
</html>
