<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>301 Darts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #c47a5a;
    --bg-stripe: #b86e50;
    --floor: #8B4513;
    --board-shadow: rgba(0,0,0,0.4);
    --bull-red: #e63946;
    --bull-ring: #fff;
    --green: #2d6a2d;
    --red: #c1121f;
    --cream: #f0ead6;
    --black: #1a1a1a;
    --white: #ffffff;
    --score-blue: #4fc3f7;
    --score-red: #ef5350;
    --gold: #ffd700;
    --dart-body: #c0392b;
    --dart-tip: #bdc3c7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    width: 100vw; height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Stripe background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 40px,
      rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 80px
    );
    pointer-events: none; z-index: 0;
  }

  /* ─── LOBBY SCREEN ─── */
  #lobby {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 30px;
  }

  .lobby-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; color: var(--white);
    text-shadow: 4px 4px 0 var(--black), -2px -2px 0 rgba(0,0,0,0.3);
    letter-spacing: 4px;
    line-height: 1;
  }

  .lobby-sub {
    font-size: 11px; color: rgba(255,255,255,0.7);
    letter-spacing: 3px; text-transform: uppercase;
    margin-top: -10px;
  }

  .dart-icon-big {
    font-size: 60px; margin: 10px 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .input-group {
    display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 280px;
  }

  .input-group label {
    font-size: 10px; color: rgba(255,255,255,0.8);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .styled-input {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 8px; padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 14px; color: white;
    outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .styled-input::placeholder { color: rgba(255,255,255,0.4); }
  .styled-input:focus { border-color: rgba(255,255,255,0.9); }

  .btn-primary {
    background: var(--black);
    color: white; border: none;
    border-radius: 8px; padding: 14px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    cursor: pointer; width: 100%; max-width: 280px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4);
    position: relative; top: 0;
  }
  .btn-primary:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    top: 2px;
  }

  .room-hint {
    font-size: 10px; color: rgba(255,255,255,0.6);
    text-align: center; max-width: 260px;
    line-height: 1.6; letter-spacing: 1px;
  }

  /* ─── WAITING SCREEN ─── */
  #waiting {
    display: none;
    position: fixed; inset: 0; z-index: 99;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
  }

  .waiting-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; color: white;
    letter-spacing: 3px;
  }

  .waiting-code {
    background: rgba(0,0,0,0.3);
    border-radius: 12px; padding: 16px 28px;
    text-align: center;
  }
  .waiting-code .label {
    font-size: 9px; color: rgba(255,255,255,0.6);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .waiting-code .code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; color: var(--gold);
    letter-spacing: 8px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── GAME SCREEN ─── */
  #game {
    display: none;
    position: fixed; inset: 0; z-index: 10;
    flex-direction: column;
    align-items: center; justify-content: flex-start;
  }

  /* Score strip at top */
  #score-bar {
    width: 100%; display: flex;
    justify-content: space-between;
    align-items: stretch;
    z-index: 20; position: relative;
    padding: 0;
    min-height: 72px;
  }

  .score-panel {
    flex: 1; display: flex;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 8px;
    gap: 2px;
    background: rgba(0,0,0,0.5);
    position: relative;
    transition: background 0.3s;
  }
  .score-panel.active {
    background: rgba(0,0,0,0.75);
  }
  .score-panel.active::after {
    content: '▶';
    position: absolute;
    bottom: 4px; right: 6px;
    font-size: 10px; color: var(--gold);
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .score-panel.p0 { border-right: 1px solid rgba(255,255,255,0.1); }
  .score-panel.p1 { border-left: 1px solid rgba(255,255,255,0.1); }

  .player-name {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
  }
  .score-panel.p0 .player-name { color: var(--score-blue); }
  .score-panel.p1 .player-name { color: var(--score-red); }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; color: white;
    line-height: 1; letter-spacing: 2px;
    transition: all 0.3s;
  }

  .darts-left {
    display: flex; gap: 4px; align-items: center;
  }
  .dart-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s;
  }
  .dart-dot.thrown { background: rgba(255,255,255,0.1); }

  /* Board area */
  #board-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    z-index: 5;
  }

  #board-container {
    position: relative;
    width: min(88vw, 420px);
    aspect-ratio: 1;
  }

  #dartboard {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    cursor: crosshair;
    user-select: none;
  }

  /* Dart pins on board */
  .dart-pin {
    position: absolute;
    width: 18px; height: 18px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 15;
  }

  /* Aim slider */
  #aim-container {
    width: min(80vw, 380px);
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    padding: 12px 0 6px;
  }

  .aim-label {
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
  }

  .slider-track {
    width: 100%; height: 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    touch-action: none;
  }
  .slider-fill {
    height: 100%; background: rgba(255,255,255,0.4);
    border-radius: 3px; pointer-events: none;
    transition: width 0.05s;
  }
  .slider-thumb {
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    transition: left 0.05s;
  }

  /* Throw button / dart display */
  #throw-section {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    padding: 8px 0 16px;
  }

  #throw-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--black);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 0 rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative; top: 0;
    font-size: 36px;
  }
  #throw-btn:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    top: 4px;
  }
  #throw-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
  }

  /* EXIT button */
  #exit-btn {
    position: fixed; top: 12px; right: 12px; z-index: 200;
    background: white; color: black;
    border: none; border-radius: 50%;
    width: 48px; height: 48px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 1px;
    cursor: pointer; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* Turn notification */
  #turn-notice {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: white; border-radius: 24px;
    padding: 10px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    opacity: 0; transition: all 0.4s;
    z-index: 50; pointer-events: none;
    white-space: nowrap;
  }
  #turn-notice.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* Score popup */
  #score-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px; color: white;
    text-shadow: 4px 4px 0 var(--black);
    -webkit-text-stroke: 3px black;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 100;
  }
  #score-popup.show {
    opacity: 1; transform: translate(-50%, -50%) scale(1);
  }

  /* BUST banner */
  #bust-banner {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg) scale(0.7);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; color: var(--score-red);
    text-shadow: 4px 4px 0 var(--black);
    -webkit-text-stroke: 3px black;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 100;
  }
  #bust-banner.show {
    opacity: 1; transform: translate(-50%, -50%) rotate(-12deg) scale(1);
  }

  /* Game over screen */
  #gameover {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
  }

  .go-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  }

  .go-winner {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: white;
    letter-spacing: 2px;
  }

  .go-scores {
    display: flex; gap: 24px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px; padding: 16px 32px;
  }

  .go-score-item {
    text-align: center;
  }
  .go-score-name {
    font-size: 9px; color: rgba(255,255,255,0.6);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .go-score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; color: white;
  }

  /* Waiting overlay during opponent's turn */
  #waiting-overlay {
    display: none;
    position: absolute; inset: 0; z-index: 30;
    border-radius: 50%;
    background: rgba(0,0,0,0.0);
    cursor: not-allowed;
  }

  .your-turn-badge {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border-radius: 20px; padding: 8px 20px;
    color: rgba(255,255,255,0.6);
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    display: none; z-index: 15;
  }

  /* Floor area visual */
  #floor {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--floor);
    z-index: 1;
  }
</style>
</head>
<body>

<div id="floor"></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="dart-icon-big">🎯</div>
  <div class="lobby-title">301</div>
  <div class="lobby-sub">Multiplayer Darts</div>

  <div class="input-group">
    <label>Your Name</label>
    <input class="styled-input" id="player-name" placeholder="Enter name" maxlength="12">
  </div>

  <div class="input-group">
    <label>Room Code</label>
    <input class="styled-input" id="room-code" placeholder="E.g. BULLS" maxlength="8" style="text-transform:uppercase">
  </div>

  <button class="btn-primary" id="join-btn">JOIN ROOM</button>

  <div class="room-hint">
    Both players enter the same room code.<br>
    Share the code with your opponent to connect.
  </div>
</div>

<!-- WAITING -->
<div id="waiting">
  <div class="waiting-title">Waiting for Opponent</div>
  <div class="waiting-code">
    <div class="label">Room Code</div>
    <div class="code" id="display-room-code">----</div>
  </div>
  <div class="spinner"></div>
  <div class="room-hint" style="color:rgba(255,255,255,0.5)">Share this code with your opponent</div>
</div>

<!-- GAME -->
<div id="game">
  <div id="score-bar">
    <div class="score-panel p0" id="panel-0">
      <div class="player-name" id="name-0">Player 1</div>
      <div class="score-value" id="score-0">301</div>
      <div class="darts-left" id="darts-0">
        <div class="dart-dot" id="d0-0"></div>
        <div class="dart-dot" id="d0-1"></div>
        <div class="dart-dot" id="d0-2"></div>
      </div>
    </div>
    <div class="score-panel p1" id="panel-1">
      <div class="player-name" id="name-1">Player 2</div>
      <div class="score-value" id="score-1">301</div>
      <div class="darts-left" id="darts-1">
        <div class="dart-dot" id="d1-0"></div>
        <div class="dart-dot" id="d1-1"></div>
        <div class="dart-dot" id="d1-2"></div>
      </div>
    </div>
  </div>

  <div id="board-area">
    <div id="board-container">
      <canvas id="dartboard" width="600" height="600"></canvas>
      <div id="waiting-overlay"></div>
    </div>

    <div id="aim-container">
      <div class="aim-label">Aim</div>
      <div class="slider-track" id="h-slider">
        <div class="slider-fill" id="h-fill" style="width:50%"></div>
        <div class="slider-thumb" id="h-thumb" style="left:50%"></div>
      </div>
    </div>

    <div id="throw-section">
      <button id="throw-btn" title="Throw">🎯</button>
    </div>
  </div>
</div>

<!-- Overlays -->
<button id="exit-btn">EXIT</button>
<div id="turn-notice"></div>
<div id="score-popup"></div>
<div id="bust-banner">BUST!</div>

<div id="gameover">
  <div class="go-title">🏆 WINNER!</div>
  <div class="go-winner" id="go-winner-name">Player 1</div>
  <div class="go-scores">
    <div class="go-score-item">
      <div class="go-score-name" id="go-name-0">P1</div>
      <div class="go-score-val" id="go-val-0">0</div>
    </div>
    <div class="go-score-item">
      <div class="go-score-name" id="go-name-1">P2</div>
      <div class="go-score-val" id="go-val-1">301</div>
    </div>
  </div>
  <button class="btn-primary" id="play-again-btn">PLAY AGAIN</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────
let socket;
let myIndex = -1;
let roomId = '';
let gameState = null;
let aimX = 0; // -1 to 1
let aimY = 0; // -1 to 1 (we'll use vertical slider too via random or fixed)
let isMyTurn = false;
let dartsOnBoard = []; // [{x,y,player}] normalized positions

// ─── Canvas Dartboard ─────────────────────────────────────────
const canvas = document.getElementById('dartboard');
const ctx = canvas.getContext('2d');
const W = 600, H = 600;
const CX = W / 2, CY = H / 2;

const SEGMENTS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

const RING_R = {
  bull: 15,
  bull25: 36,
  inner: 114,
  tripleIn: 138,
  tripleOut: 162,
  outer: 252,
  doubleIn: 276,
  doubleOut: 300
};

function drawDartboard() {
  ctx.clearRect(0, 0, W, H);

  // Outer black circle
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(CX, CY, RING_R.doubleOut + 10, 0, Math.PI*2);
  ctx.fill();

  // Draw segments
  const segAngle = (Math.PI * 2) / 20;
  const startOffset = -Math.PI/2 - segAngle/2;

  for (let i = 0; i < 20; i++) {
    const a1 = startOffset + i * segAngle;
    const a2 = a1 + segAngle;
    const isEven = i % 2 === 0;

    // Large segment (between double-inner and triple-outer, plus inner)
    // Colors: black/cream alternating for main, red/green for triple/double
    const mainColor = isEven ? '#1a1a1a' : '#f0ead6';
    const accentColor = isEven ? '#c1121f' : '#2d6a2d';

    // Inner segment (bull ring to triple-inner)
    ctx.fillStyle = mainColor;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, RING_R.tripleIn, a1, a2);
    ctx.closePath();
    ctx.fill();

    // Triple ring
    ctx.fillStyle = accentColor;
    ctx.beginPath();
    ctx.arc(CX, CY, RING_R.tripleOut, a1, a2);
    ctx.arc(CX, CY, RING_R.tripleIn, a2, a1, true);
    ctx.closePath();
    ctx.fill();

    // Outer segment (triple to double-inner)
    ctx.fillStyle = mainColor;
    ctx.beginPath();
    ctx.arc(CX, CY, RING_R.doubleIn, a1, a2);
    ctx.arc(CX, CY, RING_R.tripleOut, a2, a1, true);
    ctx.closePath();
    ctx.fill();

    // Double ring
    ctx.fillStyle = accentColor;
    ctx.beginPath();
    ctx.arc(CX, CY, RING_R.doubleOut, a1, a2);
    ctx.arc(CX, CY, RING_R.doubleIn, a2, a1, true);
    ctx.closePath();
    ctx.fill();
  }

  // Draw wire lines
  ctx.strokeStyle = 'rgba(180,160,120,0.5)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 20; i++) {
    const a = startOffset + i * segAngle;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a) * RING_R.bull25, CY + Math.sin(a) * RING_R.bull25);
    ctx.lineTo(CX + Math.cos(a) * RING_R.doubleOut, CY + Math.sin(a) * RING_R.doubleOut);
    ctx.stroke();
  }

  // Ring dividers
  [RING_R.tripleIn, RING_R.tripleOut, RING_R.doubleIn, RING_R.doubleOut].forEach(r => {
    ctx.strokeStyle = 'rgba(180,160,120,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.stroke();
  });

  // Bull25
  ctx.fillStyle = '#2d6a2d';
  ctx.beginPath();
  ctx.arc(CX, CY, RING_R.bull25, 0, Math.PI*2);
  ctx.fill();

  // Bullseye
  ctx.fillStyle = '#c1121f';
  ctx.beginPath();
  ctx.arc(CX, CY, RING_R.bull, 0, Math.PI*2);
  ctx.fill();

  // Numbers
  ctx.fillStyle = 'white';
  ctx.font = 'bold 22px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const numR = RING_R.doubleOut + 22;
  for (let i = 0; i < 20; i++) {
    const a = startOffset + (i + 0.5) * segAngle;
    const x = CX + Math.cos(a) * numR;
    const y = CY + Math.sin(a) * numR;
    ctx.fillText(SEGMENTS[i], x, y);
  }

  // Draw darts on board
  dartsOnBoard.forEach(d => drawDartPin(d));

  // Draw aim indicator if it's my turn
  if (isMyTurn) {
    const px = CX + aimX * RING_R.doubleOut;
    const py = CY + aimY * RING_R.doubleOut;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(px, py, 12, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawDartPin(d) {
  const px = CX + d.x * RING_R.doubleOut;
  const py = CY + d.y * RING_R.doubleOut;

  // Dart body (small)
  const colors = ['#4fc3f7', '#ef5350'];
  const col = colors[d.player] || '#fff';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px+2, py+4, 4, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // Barrel
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(px-3, py-12, 6, 14, 2);
  ctx.fill();

  // Tip
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.moveTo(px-2, py+2);
  ctx.lineTo(px+2, py+2);
  ctx.lineTo(px, py+6);
  ctx.closePath();
  ctx.fill();

  // Flights
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(px, py-12);
  ctx.lineTo(px-6, py-20);
  ctx.lineTo(px, py-15);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(px, py-12);
  ctx.lineTo(px+6, py-20);
  ctx.lineTo(px, py-15);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ─── Slider ───────────────────────────────────────────────────
let sliderDragging = false;
let sliderVal = 0.5; // 0-1

const hSlider = document.getElementById('h-slider');
const hFill = document.getElementById('h-fill');
const hThumb = document.getElementById('h-thumb');

function setSlider(val) {
  sliderVal = Math.max(0, Math.min(1, val));
  aimX = (sliderVal - 0.5) * 1.6; // -0.8 to 0.8
  hFill.style.width = (sliderVal * 100) + '%';
  hThumb.style.left = (sliderVal * 100) + '%';
  drawDartboard();
}

function sliderFromEvent(e) {
  const rect = hSlider.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return (clientX - rect.left) / rect.width;
}

hSlider.addEventListener('mousedown', e => {
  if (!isMyTurn) return;
  sliderDragging = true;
  setSlider(sliderFromEvent(e));
});
hSlider.addEventListener('touchstart', e => {
  if (!isMyTurn) return;
  sliderDragging = true;
  setSlider(sliderFromEvent(e));
}, {passive:true});
window.addEventListener('mousemove', e => { if (sliderDragging) setSlider(sliderFromEvent(e)); });
window.addEventListener('touchmove', e => { if (sliderDragging) setSlider(sliderFromEvent(e)); }, {passive:true});
window.addEventListener('mouseup', () => sliderDragging = false);
window.addEventListener('touchend', () => sliderDragging = false);

// ─── Throw ────────────────────────────────────────────────────
document.getElementById('throw-btn').addEventListener('click', throwDart);

function throwDart() {
  if (!isMyTurn || !socket) return;
  if (gameState && gameState.dartsThrown >= 3) return;

  // Add small random y variation
  const randY = (Math.random() - 0.5) * 0.3;
  aimY = randY;

  // Add slight random spread
  const jitterX = aimX + (Math.random() - 0.5) * 0.08;
  const jitterY = aimY + (Math.random() - 0.5) * 0.08;

  socket.emit('throw_dart', { x: jitterX, y: jitterY });
}

// ─── Score/score UI ───────────────────────────────────────────
function updateScoreUI(state) {
  document.getElementById('score-0').textContent = state.scores[0];
  document.getElementById('score-1').textContent = state.scores[1];

  // Active panel
  document.getElementById('panel-0').classList.toggle('active', state.currentPlayer === 0);
  document.getElementById('panel-1').classList.toggle('active', state.currentPlayer === 1);

  // Darts thrown indicators (for current player's turn)
  for (let p = 0; p < 2; p++) {
    for (let d = 0; d < 3; d++) {
      const dot = document.getElementById(`d${p}-${d}`);
      if (p === state.currentPlayer) {
        dot.classList.toggle('thrown', d < state.dartsThrown);
      } else {
        dot.classList.remove('thrown');
      }
    }
  }

  isMyTurn = (myIndex === state.currentPlayer) && !state.gameOver;
  const throwBtn = document.getElementById('throw-btn');
  throwBtn.disabled = !isMyTurn;
  document.getElementById('waiting-overlay').style.display = isMyTurn ? 'none' : 'block';
  document.getElementById('h-slider').style.opacity = isMyTurn ? '1' : '0.4';
  drawDartboard();
}

function showScorePopup(score, bust) {
  if (bust) {
    const b = document.getElementById('bust-banner');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1800);
  } else {
    const p = document.getElementById('score-popup');
    p.textContent = score > 0 ? '+'+score : '0';
    p.style.color = score >= 50 ? '#ffd700' : score >= 20 ? '#fff' : '#aaa';
    p.classList.add('show');
    setTimeout(() => p.classList.remove('show'), 1500);
  }
}

function showTurnNotice(text) {
  const el = document.getElementById('turn-notice');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Socket ───────────────────────────────────────────────────
document.getElementById('join-btn').addEventListener('click', joinRoom);
document.getElementById('room-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});

function joinRoom() {
  const name = document.getElementById('player-name').value.trim() || 'Player';
  roomId = document.getElementById('room-code').value.trim().toUpperCase();
  if (!roomId) { alert('Enter a room code'); return; }

  socket = io();

  socket.on('connect', () => {
    socket.emit('join_room', { roomId, playerName: name });
  });

  socket.on('joined', ({ playerIndex, gameState: gs }) => {
    myIndex = playerIndex;
    gameState = gs;
    document.getElementById('display-room-code').textContent = roomId;
  });

  socket.on('waiting_for_opponent', () => {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('waiting').style.display = 'flex';
  });

  socket.on('room_full', () => {
    alert('Room is full! Try a different code.');
    socket.disconnect();
    socket = null;
  });

  socket.on('game_start', ({ players, gameState: gs }) => {
    gameState = gs;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    document.getElementById('exit-btn').style.display = 'flex';

    // Set player names
    players.forEach(p => {
      document.getElementById(`name-${p.index}`).textContent = p.name;
      document.getElementById(`go-name-${p.index}`).textContent = p.name;
    });

    dartsOnBoard = [];
    setSlider(0.5);
    updateScoreUI(gs);
    showTurnNotice(gs.currentPlayer === myIndex ? 'Your turn!' : `${players[gs.currentPlayer].name}'s turn`);
  });

  socket.on('dart_thrown', ({ dart, scores, bust, gameState: gs }) => {
    gameState = gs;
    // Add dart to board
    dartsOnBoard.push(dart);
    updateScoreUI(gs);
    showScorePopup(dart.score, bust);
    drawDartboard();
  });

  socket.on('next_turn', ({ currentPlayer, gameState: gs }) => {
    gameState = gs;
    const players = gs.players;
    const name = players.find(p => p.index === currentPlayer)?.name || `Player ${currentPlayer+1}`;
    showTurnNotice(currentPlayer === myIndex ? 'Your turn!' : `${name}'s turn`);
    updateScoreUI(gs);
  });

  socket.on('game_over', ({ winner, winnerName, scores }) => {
    document.getElementById('go-winner-name').textContent = winnerName;
    document.getElementById('go-val-0').textContent = scores[0];
    document.getElementById('go-val-1').textContent = scores[1];
    document.getElementById('gameover').style.display = 'flex';
  });

  socket.on('opponent_disconnected', () => {
    showTurnNotice('Opponent disconnected');
    document.getElementById('throw-btn').disabled = true;
  });
}

document.getElementById('exit-btn').addEventListener('click', () => {
  if (socket) { socket.disconnect(); socket = null; }
  location.reload();
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  location.reload();
});

// Init draw
setSlider(0.5);
drawDartboard();
</script>
